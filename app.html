<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>派生态应用中心</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
    <style>
        @keyframes gradient {
            0%, 100% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
        }
        .animate-gradient {
            background-size: 200% 200%;
            animation: gradient 8s ease infinite;
        }
        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }
        .animate-float {
            animation: float 4s ease-in-out infinite;
        }
    </style>
</head>
<body class="bg-gradient-to-br from-indigo-600 via-purple-600 to-pink-600 animate-gradient min-h-screen">
    <div class="container mx-auto p-6 max-w-2xl">
        <header class="text-center mt-8 mb-12">
            <div class="inline-block animate-float">
                <i class="fa fa-rocket text-6xl text-yellow-300 mb-4" style="text-shadow: 0 0 20px rgba(255,255,0,0.5);"></i>
            </div>
            <h1 class="text-4xl font-bold text-white mb-2" style="text-shadow: 2px 2px 8px rgba(0,0,0,0.3);">
                派生态应用中心
            </h1>
            <p class="text-white/80 text-lg">选择您要进入的应用</p>
        </header>

        <div class="space-y-6">
            <a href="index.html" class="block group">
                <div class="bg-white/15 backdrop-blur-lg p-8 rounded-3xl shadow-2xl border-2 border-white/30 hover:border-yellow-300 transition-all duration-500 transform hover:scale-105 hover:-translate-y-2">
                    <div class="flex items-center">
                        <div class="w-20 h-20 bg-gradient-to-br from-blue-400 to-blue-600 rounded-2xl flex items-center justify-center mr-6 shadow-lg">
                            <i class="fa fa-globe text-4xl text-white"></i>
                        </div>
                        <div class="flex-1">
                            <h2 class="text-2xl font-bold text-white mb-2">Web3生态应用</h2>
                            <p class="text-white/70 text-sm">一站式派生态资讯与应用导航</p>
                            <div class="mt-3 flex items-center text-yellow-300 text-sm">
                                <i class="fa fa-arrow-right mr-2"></i>
                                <span>进入应用</span>
                            </div>
                        </div>
                    </div>
                </div>
            </a>

            <a href="index .html" class="block group">
                <div class="bg-white/15 backdrop-blur-lg p-8 rounded-3xl shadow-2xl border-2 border-white/30 hover:border-pink-300 transition-all duration-500 transform hover:scale-105 hover:-translate-y-2">
                    <div class="flex items-center">
                        <div class="w-20 h-20 bg-gradient-to-br from-purple-400 to-purple-600 rounded-2xl flex items-center justify-center mr-6 shadow-lg">
                            <i class="fa fa-users text-4xl text-white"></i>
                        </div>
                        <div class="flex-1">
                            <h2 class="text-2xl font-bold text-white mb-2">派生态社区宣发</h2>
                            <p class="text-white/70 text-sm">社区生态详情与招募信息</p>
                            <div class="mt-3 flex items-center text-yellow-300 text-sm">
                                <i class="fa fa-arrow-right mr-2"></i>
                                <span>进入应用</span>
                            </div>
                        </div>
                    </div>
                </div>
            </a>
        </div>

        <div class="mt-12 text-center">
            <div class="inline-block bg-black/20 backdrop-blur-sm px-6 py-3 rounded-full">
                <p class="text-white/60 text-sm">
                    <i class="fa fa-info-circle mr-2"></i>
                    所有应用均已测试并支持内容编辑
                </p>
            </div>
        </div>

        <footer class="mt-16 mb-8 text-center">
            <p class="text-white/50 text-sm">
                © 2026 派生态社区 · Pi Network
            </p>
        </footer>
    </div>
</body>
</html>
